<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחשבון מס מהיר</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/tesseract.js@4.0.2/dist/tesseract.min.js"></script>
</head>
<body class="bg-gray-100 p-8 text-right">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-2xl shadow-xl">
        <h1 class="text-2xl font-bold mb-4 text-blue-600">מחשבון מניות אוטומטי</h1>
        
        <div class="mb-6 p-4 border-2 border-dashed border-gray-300 rounded-lg text-center">
            <input type="file" id="img" accept="image/*" class="hidden">
            <label for="img" class="cursor-pointer text-blue-500 font-bold">לחץ כאן להעלאת צילום המסך</label>
            <p id="status" class="text-sm text-gray-400 mt-2 italic">המערכת תזהה לבד תאריכים וכמויות</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm">מחיר מכירה היום ($)</label>
                <input type="number" id="sell" value="65" class="w-full p-2 border rounded">
            </div>
            <div>
                <label class="block text-sm">שער דולר משוער</label>
                <input type="number" id="usd" value="3.65" step="0.01" class="w-full p-2 border rounded">
            </div>
        </div>

        <div id="out" class="hidden">
            <div class="bg-blue-50 p-4 rounded-lg mb-4">
                <div class="flex justify-between border-b pb-2 mb-2">
                    <span>סה"כ נטו מוערך (ש"ח):</span>
                    <span id="net" class="font-bold text-xl text-blue-800">₪0</span>
                </div>
                <div class="text-sm text-gray-600">
                    <p>מתוכם כתוספת לשכר: <span id="salaryPart">₪0</span></p>
                    <p>מתוכם כרווח הון (25% מס): <span id="capPart">₪0</span></p>
                </div>
            </div>
            <table class="w-full text-sm">
                <thead><tr class="border-b"><th>תאריך</th><th>כמות</th><th>שווי ברוטו</th></tr></thead>
                <tbody id="rows"></tbody>
            </table>
        </div>
    </div>

    <script>
        const GRANT_PRICE = 46.28; // הנתון מהתמונה שלך

        document.getElementById('img').onchange = async (e) => {
            const status = document.getElementById('status');
            status.innerText = "מעבד...";
            const { data: { text } } = await Tesseract.recognize(e.target.files[0], 'eng');
            
            const data = [];
            text.split('\n').forEach(line => {
                const d = line.match(/(\d{2}\/\d{2}\/\d{4})/);
                const q = line.match(/(\d{1,3}(,\d{3})*)/);
                if (d && q) {
                    const qty = parseFloat(q[0].replace(/,/g, ''));
                    if (qty > 10) data.push({ date: d[0], qty });
                }
            });
            calc(data);
        };

        function calc(data) {
            const sell = parseFloat(document.getElementById('sell').value);
            const usd = parseFloat(document.getElementById('usd').value);
            let totalSalary = 0, totalCap = 0, html = "";

            data.forEach(item => {
                const salary = item.qty * GRANT_PRICE * usd;
                const cap = item.qty * (sell - GRANT_PRICE) * usd;
                totalSalary += salary;
                totalCap += cap;
                html += `<tr class="border-b"><td>${item.date}</td><td>${item.qty}</td><td>₪${(salary+cap).toLocaleString()}</td></tr>`;
            });

            document.getElementById('rows').innerHTML = html;
            document.getElementById('salaryPart').innerText = `₪${totalSalary.toLocaleString()}`;
            document.getElementById('capPart').innerText = `₪${totalCap.toLocaleString()}`;
            document.getElementById('net').innerText = `₪${(totalSalary + totalCap).toLocaleString()}`;
            document.getElementById('out').classList.remove('hidden');
            document.getElementById('status').innerText = "הסריקה הושלמה!";
        }
    </script>
</body>
</html>
